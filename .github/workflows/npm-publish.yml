name: NPM Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - typescript-sdk
          - cli-node
          - highlightjs-wvlet
          - prismjs-wvlet
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish-typescript-sdk:
    name: Publish TypeScript SDK to NPM
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'typescript-sdk')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: sbt

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Build Scala.js SDK (optimized)
        run: ./sbt "sdkJs/fullLinkJS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build:ts only — `run build` would re-link with fastLinkJS and overwrite the
      # optimized bundle (#1894). prepublishOnly verifies the package contents.
      - name: Build TypeScript
        run: pnpm --filter @wvlet/wvlet run build:ts

      # The tests import lib/main.js, so this exercises the optimized bundle that ships
      - name: Run tests
        run: pnpm --filter @wvlet/wvlet run test:ci

      - name: Set version from tag
        if: github.event_name == 'push'
        working-directory: sdks/typescript
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
          pnpm version $VERSION --no-git-tag-version

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        working-directory: sdks/typescript
        run: |
          pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to NPM
        working-directory: sdks/typescript
        run: npm publish --provenance --access public

  publish-cli-node:
    name: Publish @wvlet/cli (Node.js) to NPM
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'cli-node')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: sbt

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Build wvlet-cli-core JS bundle
        run: ./sbt "cliCoreJS/fullLinkJS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        if: github.event_name == 'push'
        working-directory: sdks/cli-node
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
          pnpm version $VERSION --no-git-tag-version

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        working-directory: sdks/cli-node
        run: |
          pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to NPM
        working-directory: sdks/cli-node
        run: npm publish --provenance --access public

  publish-prismjs:
    name: Publish Prism.js Wvlet extension to NPM
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'prismjs-wvlet')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @wvlet/prismjs-wvlet run build

      - name: Run tests
        run: pnpm --filter @wvlet/prismjs-wvlet test

      - name: Set version from tag
        if: github.event_name == 'push'
        working-directory: prismjs-wvlet
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
          pnpm version $VERSION --no-git-tag-version

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        working-directory: prismjs-wvlet
        run: |
          pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to NPM
        working-directory: prismjs-wvlet
        run: npm publish --provenance --access public

  publish-highlightjs:
    name: Publish highlight.js extension to NPM
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'highlightjs-wvlet')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @wvlet/highlightjs-wvlet run build

      - name: Run tests
        run: pnpm --filter @wvlet/highlightjs-wvlet test

      - name: Run markup tests
        run: pnpm --filter @wvlet/highlightjs-wvlet run mocha

      - name: Set version from tag
        if: github.event_name == 'push'
        working-directory: highlightjs-wvlet
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
          pnpm version $VERSION --no-git-tag-version

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        working-directory: highlightjs-wvlet
        run: |
          pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to NPM
        working-directory: highlightjs-wvlet
        run: npm publish --provenance --access public
