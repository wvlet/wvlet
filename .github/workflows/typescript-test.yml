name: TypeScript

on:
  pull_request:
    paths:
      - 'sdks/typescript/**'
      - 'wvlet-sdk-js/**'
      - '.github/workflows/typescript-test.yml'
  push:
    branches:
      - main
    paths:
      - 'sdks/typescript/**'
      - 'wvlet-sdk-js/**'
      - '.github/workflows/typescript-test.yml'

jobs:
  test:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: sbt
      
      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build Scala.js SDK
        run: ./sbt "sdkJs/fastLinkJS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @wvlet/wvlet run lint

      - name: Run tests
        run: pnpm --filter @wvlet/wvlet run test:ci

      - name: Build TypeScript
        run: pnpm --filter @wvlet/wvlet exec tsc

      - name: Run example
        working-directory: sdks/typescript
        run: node examples/node-example.js