name: Prism.js

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      prismjs: ${{ steps.filter.outputs.prismjs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            prismjs:
              - 'prismjs-wvlet/**'
              - '.github/workflows/prismjs.yml'

  test:
    name: Prism.js
    needs: changes
    if: ${{ needs.changes.outputs.prismjs == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: pnpm/action-setup@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm --filter @wvlet/prismjs-wvlet run build

    - name: Run tests
      run: pnpm --filter @wvlet/prismjs-wvlet test

    - name: Verify dist files
      working-directory: prismjs-wvlet
      run: |
        if [ ! -f "dist/prism-wvlet.js" ]; then
          echo "dist/prism-wvlet.js not found!"
          exit 1
        fi
        if [ ! -f "dist/prism-wvlet.min.js" ]; then
          echo "dist/prism-wvlet.min.js not found!"
          exit 1
        fi
        echo "✅ Dist files generated successfully"