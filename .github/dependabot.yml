# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # All JS/TS packages live in the same pnpm workspace (see pnpm-workspace.yaml),
  # so Dependabot only needs to look at the root pnpm-lock.yaml. It still opens
  # one PR per package.json under the workspace.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Grouping Docusaurus module updates into a single PR
      docusaurus:
        patterns:
          - "@docusaurus/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      vscode:
        patterns:
          - "@types/vscode"
          - "@vscode/*"
      highlightjs:
        patterns:
          - "highlight.js"
          - "highlightjs-*"
      prismjs:
        patterns:
          - "prismjs"
          - "prism-*"
